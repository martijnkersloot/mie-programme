name: Parse MIE Programme

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pdfplumber gdown

      - name: Parse programme
        env:
          # Override via repo variable: Settings → Variables → GDRIVE_ID
          GDRIVE_ID: ${{ vars.GDRIVE_ID || '1_SAA1ks7xbW7TRGKiLvhSZ_6MYdrsA4P' }}
        run: python scripts/parse_programme.py --output data/programme.json

      - name: Commit updated JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/programme.json
          git diff --staged --quiet || git commit -m "chore: update programme.json [skip ci]"
          git push
